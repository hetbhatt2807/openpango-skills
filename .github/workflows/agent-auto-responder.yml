name: Agent Auto-Responder
on: 
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write

jobs:
  # Your jobs here
  example-job:
    runs-on: ubuntu-latest
    steps:
      # Example steps
      - name: Checkout
        uses: actions/checkout@v4
      # Add your bot steps here

jobs:
  auto-reply:
    runs-on: ubuntu-latest
    steps:
      - name: Check for /apply command
        if: contains(github.event.comment.body, '/apply')
        uses: actions/github-script@v6
        with:
          script: |
            const issue_number = context.issue.number;
            const user = context.payload.comment.user.login;

            const fixRef = 'Fixes #' + issue_number;
            const message = [
              '🤖 **Acknowledgment**',
              '',
              'Thanks @' + user + ' — your interest has been noted.',
              '',
              '**Before you can be assigned, please ensure you have:**',
              '1. ⭐ **Starred** this repository.',
              '2. **Followed** [@openpango](https://github.com/openpango) on GitHub.',
              '',
              '**Next steps:**',
              '1. Fork or clone this repository.',
              '2. Implement the required changes.',
              '3. Open a Pull Request referencing this issue (e.g., `' + fixRef + '`).',
              '4. Include relevant context or notes in the PR description.',
              '',
              '> ⚠️ Applications from accounts that have not starred and followed will not be assigned.',
              '',
              'Good luck!'
            ].join('\n');

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: message
            });
